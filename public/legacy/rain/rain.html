<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo list</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="rainy.css">
</head>
<body>
  <div style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
    <button onclick="window.location.href='/'" style="padding: 10px 20px; background: #9989af; color: white; border: none; border-radius: 6px; cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 10px;">← HOME</button>
  </div>
  <div class="container">
    <h1>To-do List</h1>
    <div class="input-container">
      <input class="todo-input" placeholder="Add a new task...">
      <button class="add-button">
        <i class="fa fa-plus-circle"></i>
      </button>
    </div>
    <div class="filters">
      <div class="filter" data-filter="completed">Complete</div>
      <div class="filter" data-filter="pending">Incomplete</div>
      <div class="delete-all">Delete All</div>
    </div>
    <div class="todos-container">
      <ul class="todos"></ul>
    </div>
  </div>
  <script src="raiin.js"></script>
</body>
</html>
